<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema ML de Apoyo BI-RADS</title>

  <!-- Favicons -->
  <link rel="icon" href="assets/logos/logo-icon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/logos/favicon-32x32-v2.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/logos/favicon-16x16-v2.png">
  <link rel="shortcut icon" href="assets/logos/favicon.ico">

  <!-- Apple Touch Icons v2 (pantalla de inicio iOS/iPadOS) -->
  <link rel="apple-touch-icon" href="assets/logos/apple-touch-icon-v2.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/logos/apple-touch-icon-152x152-v2.png">
  <link rel="apple-touch-icon" sizes="167x167" href="assets/logos/apple-touch-icon-167x167-v2.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/logos/apple-touch-icon-180x180-v2.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.webmanifest?v=2">

  <!-- Tema y comportamiento iOS standalone -->
  <meta name="theme-color" content="#1A3A6E">
  <meta name="apple-mobile-web-app-title" content="BI-RADS ML">
  <meta name="application-name" content="BI-RADS ML">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- React + Babel (sin build step) -->
  <script
    src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"
  ></script>

  <!-- Tipografía: Inter (UI) + IBM Plex Mono (métricas/scores) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="root"></div>

  <!--
    Orden de carga:
      1) Datos (BIRADS, makeTheme)
      2) Utilidades (analyzer, exporter)
      3) Componentes presentacionales
      4) App.jsx (composición)
      5) Mount
  -->

  <!--
    ── Backend ────────────────────────────────────────────────────────────────
    En producción (Flask sirve frontend y API desde el mismo origen) no se necesita nada extra.
    En desarrollo con Live Server + Flask separado, descomenta:
    <script>window.API_BASE = 'http://localhost:5000';</script>
  -->

  <!-- 1) Datos -->
  <script type="text/babel" src="src/data/birads.js?v=2"></script>
  <script type="text/babel" src="src/data/theme.js?v=2"></script>

  <!-- 2) Utilidades -->
  <script type="text/babel" src="src/utils/analyzer.js"></script>
  <script type="text/babel" src="src/utils/exporter.js"></script>

  <!-- 3) Componentes -->
  <script type="text/babel" src="src/components/ThemeToggle.jsx"></script>
  <script type="text/babel" src="src/components/InfoModal.jsx"></script>
  <script type="text/babel" src="src/components/ResultCard.jsx"></script>
  <script type="text/babel" src="src/components/BiradsReference.jsx"></script>
  <script type="text/babel" src="src/components/ReferenceView.jsx"></script>
  <script type="text/babel" src="src/components/BinaryResult.jsx"></script>
  <script type="text/babel" src="src/components/Navbar.jsx"></script>
  <script type="text/babel" src="src/components/InputPanel.jsx"></script>
  <script type="text/babel" src="src/components/ResultsPanel.jsx"></script>
  <script type="text/babel" src="src/components/TweaksPanel.jsx"></script>

  <!-- 4) Raíz -->
  <script type="text/babel" src="src/App.jsx"></script>

  <!-- 5) Mount -->
  <script type="text/babel">
    const Root = window.App;
    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
